        url: https://stable.dl2.discordapp.net/distro/app/stable/linux/x64/1.0.149/discord_erlpack/1/full.distro
        sha256: b73fc908f16df9b03d133e91513d3e13d55fe560be2d768eca0c6c008cd43c96
