        url: https://stable.dl2.discordapp.net/distro/app/stable/linux/x64/1.0.150/discord_desktop_core/1/full.distro
        sha256: 551324457afff3ccde3c5a7953b50b0c6a7603b0ec82874d942c02c5d8f3d5bc
        x-checker-data:
