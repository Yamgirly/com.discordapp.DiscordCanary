      - type: file
        dest-filename: discord_desktop_core_module.tar.br
        url: https://stable.dl2.discordapp.net/distro/app/stable/linux/x64/1.0.148/discord_desktop_core/1/full.distro
        sha256: 4886953943d13201bfebbc0725710cebe769b500415e1cdd8a4f5e0b4b0efdb6
        x-checker-data:
